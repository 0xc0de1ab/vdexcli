name: "[01] CI Build and test"

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_cache:
        description: "Disable Go module cache (force fresh download)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Format check ──────────────────────────────────────────────
  fmt-check:
    name: "fmt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ github.event.inputs.skip_cache != 'true' }}
      - name: Check gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$diff"
            exit 1
          fi

  # ── 2. go vet + mod tidy check ──────────────────────────────────
  vet:
    name: "vet"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ github.event.inputs.skip_cache != 'true' }}
      - name: go mod tidy (no drift)
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: go mod verify
        run: go mod verify
      - name: go vet
        run: go vet ./...
      - name: WASM vet
        run: GOOS=js GOARCH=wasm go vet ./wasm/

  # ── 3. golangci-lint ────────────────────────────────────────────
  lint:
    name: "lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ github.event.inputs.skip_cache != 'true' }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  # ── 4. Vulnerability scan ────────────────────────────────────────
  vulncheck:
    name: "vulncheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ github.event.inputs.skip_cache != 'true' }}
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  # ── 5. Test + coverage ──────────────────────────────────────────
  test:
    name: "test"
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.total }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ github.event.inputs.skip_cache != 'true' }}
      - name: Install zstd
        run: sudo apt-get install -y zstd
      - name: Run tests
        run: go test -v -count=1 ./...
      - name: Coverage check (≥ 85%)
        id: coverage
        run: |
          go test -coverprofile=coverage.out \
            ./internal/binutil/ \
            ./internal/parser/ \
            ./internal/modifier/ \
            ./internal/extractor/ \
            ./internal/model/ \
            ./internal/presenter/ \
            ./pkg/vdex/
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          echo "total=${total}%" >> "$GITHUB_OUTPUT"
          if [ "$(echo "$total < 85" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below minimum 85%"
            exit 1
          fi
      - name: Upload coverage artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ── 6. Cross-platform build ──────────────────────────────────────
  build:
    name: "build (${{ matrix.goos }}/${{ matrix.goarch }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos:   [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ github.event.inputs.skip_cache != 'true' }}
      - name: Build
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          make build GOOS=$GOOS GOARCH=$GOARCH
          ls -lh build/$GOOS-$GOARCH/release/
      - name: Smoke test (linux/amd64 only)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          build/linux-amd64/release/vdexcli version
          build/linux-amd64/release/vdexcli dump --format jsonl | head -c 100

  # ── 7. WASM build ───────────────────────────────────────────────
  build-wasm:
    name: "build (wasm)"
    runs-on: ubuntu-latest
    outputs:
      size: ${{ steps.wasm.outputs.size }}
      smoke: ${{ steps.smoke.outcome }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ github.event.inputs.skip_cache != 'true' }}
      - name: Build WASM
        id: wasm
        run: |
          GOOS=js GOARCH=wasm go build \
            -trimpath \
            -ldflags="-s -w" \
            -o vdex.wasm \
            ./wasm/
          ls -lh vdex.wasm
          echo "size=$(stat -c%s vdex.wasm)" >> "$GITHUB_OUTPUT"
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Test WASM bridge
        id: smoke
        run: |
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" wasm_exec.js
          node web/scripts/wasm-smoke.mjs vdex.wasm wasm_exec.js
      - name: Upload WASM artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: vdex-wasm
          path: vdex.wasm
          retention-days: 7

  summary:
    name: "summary"
    if: always()
    needs: [fmt-check, vet, lint, vulncheck, test, build, build-wasm]
    runs-on: ubuntu-latest
    env:
      FMT_RESULT: ${{ needs['fmt-check'].result }}
      VET_RESULT: ${{ needs.vet.result }}
      LINT_RESULT: ${{ needs.lint.result }}
      VULNCHECK_RESULT: ${{ needs.vulncheck.result }}
      TEST_RESULT: ${{ needs.test.result }}
      BUILD_RESULT: ${{ needs.build.result }}
      WASM_RESULT: ${{ needs['build-wasm'].result }}
      COVERAGE: ${{ needs.test.outputs.coverage }}
      WASM_SIZE: ${{ needs['build-wasm'].outputs.size }}
      WASM_SMOKE: ${{ needs['build-wasm'].outputs.smoke }}
    steps:
      - name: Write workflow summary
        run: |
          short_sha="${GITHUB_SHA::7}"
          coverage="${COVERAGE:-unavailable}"
          wasm_size="${WASM_SIZE:-unavailable}"
          {
            echo "## CI Build and Test"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            printf '| Format | `%s` |\n' "$FMT_RESULT"
            printf '| Vet and modules | `%s` |\n' "$VET_RESULT"
            printf '| Lint | `%s` |\n' "$LINT_RESULT"
            printf '| Vulnerability scan | `%s` |\n' "$VULNCHECK_RESULT"
            printf '| Tests and coverage | `%s` |\n' "$TEST_RESULT"
            printf '| Cross-platform builds | `%s` |\n' "$BUILD_RESULT"
            printf '| WASM build | `%s` |\n' "$WASM_RESULT"
            printf '| WASM bridge | `%s` |\n' "${WASM_SMOKE:-unavailable}"
            echo
            echo "### Outputs"
            printf -- '- Coverage: `%s`\n' "$coverage"
            printf -- '- Targets: `linux/amd64`, `linux/arm64`, `darwin/amd64`, `darwin/arm64`, `windows/amd64`\n'
            printf -- '- WASM artifact: `%s bytes`\n' "$wasm_size"
            echo
            echo "### Run"
            printf -- '- Event: `%s`\n' "$GITHUB_EVENT_NAME"
            printf -- '- Ref: `%s`\n' "$GITHUB_REF_NAME"
            printf -- '- Commit: [`%s`](%s/%s/commit/%s)\n' "$short_sha" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
