name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.github/ISSUE_TEMPLATE/**']
  pull_request:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.github/ISSUE_TEMPLATE/**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install zstd
        run: sudo apt-get install -y zstd
      - name: Run tests
        run: go test -v -count=1 ./...
      - name: Coverage (testable packages)
        run: |
          go test -coverprofile=coverage.out ./internal/binutil/ ./internal/parser/ ./internal/modifier/ ./internal/extractor/ ./internal/model/ ./internal/presenter/
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          if [ "$(echo "$total < 85" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below minimum 85%"
            exit 1
          fi
      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          make build GOOS=$GOOS GOARCH=$GOARCH
          ls -lh build/$GOOS-$GOARCH/release/
      - name: Smoke test
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          build/linux-amd64/release/vdexcli version
          build/linux-amd64/release/vdexcli dump --format jsonl | head -c 100

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - run: go mod verify
      - run: go vet ./...

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "Files not formatted:"
            echo "$diff"
            exit 1
          fi
