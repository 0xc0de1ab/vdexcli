name: "[03] Release"

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install zstd
        run: sudo apt-get install -y zstd
      - name: Run tests
        run: go test -v -count=1 ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: make build GOOS=$GOOS GOARCH=$GOARCH
      - name: Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          cd build/$GOOS-$GOARCH/release
          if [ -n "$SUFFIX" ] && [ ! -f "vdexcli${SUFFIX}" ]; then
            mv vdexcli "vdexcli${SUFFIX}"
          fi
          ARCHIVE="vdexcli-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "${ARCHIVE}.zip" vdexcli${SUFFIX}
          else
            tar czf "${ARCHIVE}.tar.gz" vdexcli${SUFFIX}
          fi
          ls -lh ${ARCHIVE}.*
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vdexcli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/${{ matrix.goos }}-${{ matrix.goarch }}/release/vdexcli-*
          retention-days: 90

  publish:
    needs: release
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.github_release.outputs.url }}
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -lhR dist/
      - name: Generate checksums
        run: cd dist && sha256sum vdexcli-* > vdexcli-checksums.txt && cat vdexcli-checksums.txt
      - name: Create GitHub Release
        id: github_release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*

  summary:
    name: "summary"
    if: always()
    needs: [test, release, publish]
    runs-on: ubuntu-latest
    env:
      TEST_RESULT: ${{ needs.test.result }}
      BUILD_RESULT: ${{ needs.release.result }}
      PUBLISH_RESULT: ${{ needs.publish.result }}
      RELEASE_URL: ${{ needs.publish.outputs.release_url }}
    steps:
      - name: Write workflow summary
        run: |
          short_sha="${GITHUB_SHA::7}"
          release_url="${RELEASE_URL:-unavailable}"
          {
            echo "## Release"
            echo
            echo "| Stage | Result |"
            echo "| --- | --- |"
            printf '| Tests | `%s` |\n' "$TEST_RESULT"
            printf '| Build and package | `%s` |\n' "$BUILD_RESULT"
            printf '| Publish | `%s` |\n' "$PUBLISH_RESULT"
            echo
            echo "### Artifacts"
            printf -- '- Tag: `%s`\n' "$GITHUB_REF_NAME"
            printf -- '- Targets: `linux/amd64`, `linux/arm64`, `darwin/amd64`, `darwin/arm64`, `windows/amd64`\n'
            printf -- '- Checksums: `vdexcli-checksums.txt`\n'
            printf -- '- Release: %s\n' "$release_url"
            echo
            echo "### Run"
            printf -- '- Event: `%s`\n' "$GITHUB_EVENT_NAME"
            printf -- '- Commit: [`%s`](%s/%s/commit/%s)\n' "$short_sha" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
