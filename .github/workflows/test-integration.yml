name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install zstd
        run: sudo apt-get install -y zstd
      - name: Run all tests (including 166 real VDEX files)
        run: go test -v -count=1 -timeout 300s ./...
      - name: Coverage report
        run: |
          go test -coverprofile=coverage.out ./internal/parser/ ./internal/extractor/ ./cmd/
          echo "--- Per-package coverage ---"
          go tool cover -func=coverage.out | grep -E 'total:|parser|extractor|cmd'
